name: Deploy to DreamHost

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via rsync
        run: |
          which rsync || (apt-get update -qq && apt-get install -y rsync)
          apt-get install -y sshpass
          sshpass -p "${{ secrets.DREAMHOST_PASSWORD }}" rsync -avz \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="README.md" \
            --delete-after \
            ./ ${{ secrets.DREAMHOST_USER }}@${{ secrets.DREAMHOST_HOST }}:/home/dh_5qphxs/
