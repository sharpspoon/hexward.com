name: Deploy to DreamHost

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy site via rsync
        env:
          DEPLOY_HOST: ${{ secrets.DREAMHOST_HOST }}
          DEPLOY_USER: ${{ secrets.DREAMHOST_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DREAMHOST_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DREAMHOST_REMOTE_PATH }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          apt-get update -qq && apt-get install -y -qq sshpass rsync > /dev/null 2>&1
          sshpass -p "$DEPLOY_PASSWORD" rsync -avz \
            -e "ssh -o StrictHostKeyChecking=no -p 22" \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="README.md" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH"
