name: Deploy to DreamHost

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy site via rsync
        env:
          DEPLOY_HOST: ${{ secrets.DREAMHOST_HOST }}
          DEPLOY_USER: ${{ secrets.DREAMHOST_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DREAMHOST_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DREAMHOST_REMOTE_PATH }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          export RSYNC_RSH="ssh -o StrictHostKeyChecking=no -o PasswordAuthentication=yes"
          export SSH_ASKPASS_REQUIRE="force"
          export SSH_ASKPASS="/Users/runner/.ssh/askpass.sh"
          echo '#!/bin/bash' > "$SSH_ASKPASS"
          echo "echo $DEPLOY_PASSWORD" >> "$SSH_ASKPASS"
          chmod +x "$SSH_ASKPASS"
          rsync -avz --exclude=".git" --exclude=".github" --exclude="README.md" ./* "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH"
