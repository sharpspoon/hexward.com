name: Deploy to DreamHost

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          DEPLOY_HOST: ${{ secrets.DREAMHOST_HOST }}
          DEPLOY_USER: ${{ secrets.DREAMHOST_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DREAMHOST_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DREAMHOST_REMOTE_PATH }}
        run: |
          apt-get update && apt-get install -y sshpass rsync
          sshpass -p "$DEPLOY_PASSWORD" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            --exclude=".git" \
            --exclude=".github" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH"
