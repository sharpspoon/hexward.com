name: Deploy to DreamHost

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: easingthemes/ssh-deploy@v5.2.0
        with:
          HOST: ${{ secrets.DREAMHOST_HOST }}
          USERNAME: ${{ secrets.DREAMHOST_USER }}
          PORT: 22
          PASSWORD: ${{ secrets.DREAMHOST_PASSWORD }}
          SOURCE: "./"
          TARGET: ${{ secrets.DREAMHOST_REMOTE_PATH }}
          EXCLUDE: |
            .git
            .gitignore
            .github
            README.md
