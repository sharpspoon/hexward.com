name: Deploy to DreamHost

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DREAMHOST_HOST }}
          username: ${{ secrets.DREAMHOST_USER }}
          password: ${{ secrets.DREAMHOST_PASSWORD }}
          port: 22
          source: "./"
          target: ${{ secrets.DREAMHOST_REMOTE_PATH }}
          strip_components: 0
          overwrite: true
          command: |
            rm -f /home/dh_5qphxs/hexward.com/index.html
            rm -f /home/dh_5qphxs/hexward.com/robots.txt
            rm -f /home/dh_5qphxs/hexward.com/sitemap.xml
            rm -f /home/dh_5qphxs/hexward.com/blog.html
            rm -f /home/dh_5qphxs/hexward.com/case-studies.html
            rm -rf /home/dh_5qphxs/hexward.com/css
            rm -rf /home/dh_5qphxs/hexward.com/services
            rm -rf /home/dh_5qphxs/hexward.com/assets
