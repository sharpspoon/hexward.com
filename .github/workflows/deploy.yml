name: Deploy to DreamHost

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH keys
        run: |
          ssh-keyscan -H ${{ secrets.DREAMHOST_HOST }} >> ~/.ssh/known_hosts
          echo "${{ secrets.DREAMHOST_PASSWORD }}" | tr -d '\n' > ~/.ssh/passphrase
          chmod 600 ~/.ssh/passphrase

      - name: Deploy site via rsync
        run: |
          sshpass -p "${{ secrets.DREAMHOST_PASSWORD }}" rsync -avz \
            -e "ssh -o StrictHostKeyChecking=no -p 22" \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="README.md" \
            ./ ${{ secrets.DREAMHOST_USER }}@${{ secrets.DREAMHOST_HOST }}:${{ secrets.DREAMHOST_REMOTE_PATH }}
